# =============================================================================
# Skophia — Sovereign AI Cybersecurity Platform
# Docker Compose Configuration
# =============================================================================
#
# Quick Start:
#   docker compose up -d
#
# Air-gap deployment:
#   docker compose --profile airgap up -d
#
# With monitoring (Grafana):
#   docker compose --profile monitoring up -d
#
# Run tests:
#   docker compose --profile test run --rm test
#
# =============================================================================

services:
  # ===========================================================================
  # Skophia Visualization Dashboard (FastAPI)
  # ===========================================================================
  visualization:
    build:
      context: .
      dockerfile: Dockerfile.visualization
    ports:
      - "${VISUALIZATION_PORT:-8000}:8000"
    volumes:
      - ./visualization:/app/visualization:ro
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - BACKEND_URL=http://backend:3000
      - VICTORIA_METRICS_URL=http://victoriametrics:8428
      - OPENOBSERVE_URL=http://openobserve:5080
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skophia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # Skophia Backend Platform (TypeScript/Node.js)
  # Core Skophia telemetry engine
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - VICTORIA_METRICS_URL=http://victoriametrics:8428
      - OPENOBSERVE_URL=http://openobserve:5080
      - OPENOBSERVE_USER=${OPENOBSERVE_USER:-admin@skophia.local}
      - OPENOBSERVE_PASSWORD=${OPENOBSERVE_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AIOBS_EDGE_MODE=${AIOBS_EDGE_MODE:-false}
    depends_on:
      victoriametrics:
        condition: service_healthy
      openobserve-healthcheck:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skophia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # Synapsix — Threat Detection Engine
  # Semantic drift, MITRE ICS correlation, IT/OT correlation
  # ===========================================================================
  synapsix:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${SYNAPSIX_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - VICTORIA_METRICS_URL=http://victoriametrics:8428
      - OPENOBSERVE_URL=http://openobserve:5080
      - OPENOBSERVE_USER=${OPENOBSERVE_USER:-admin@skophia.local}
      - OPENOBSERVE_PASSWORD=${OPENOBSERVE_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SYNAPSIX_MODE=true
      - SYNAPSIX_ALERT_MIN_CONFIDENCE=${SYNAPSIX_ALERT_MIN_CONFIDENCE:-0.4}
      - SYNAPSIX_NIS2_ENABLED=${SYNAPSIX_NIS2_ENABLED:-true}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - skophia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # TRM Agent — Edge AI Agent (optional, for demo)
  # ===========================================================================
  trm-agent:
    build:
      context: .
      dockerfile: Dockerfile.backend
    profiles:
      - trm
    ports:
      - "${TRM_AGENT_PORT:-3002}:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - TRM_MODE=true
      - TRM_AGENT_ID=${TRM_AGENT_ID:-trm-demo-001}
      - TRM_UPSTREAM_URL=http://backend:3000
      - TRM_CONNECTIVITY_CHECK_MS=${TRM_CONNECTIVITY_CHECK_MS:-30000}
      - TRM_LOCAL_DETECTION=${TRM_LOCAL_DETECTION:-true}
      - TRM_BUFFER_MAX_ENTRIES=${TRM_BUFFER_MAX_ENTRIES:-100000}
      - TRM_BUFFER_MAX_SIZE_MB=${TRM_BUFFER_MAX_SIZE_MB:-100}
    networks:
      - skophia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # VictoriaMetrics — Sovereign Time-Series Database
  # ===========================================================================
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.96.0
    ports:
      - "${VICTORIA_METRICS_PORT:-8428}:8428"
    volumes:
      - victoriametrics-data:/victoria-metrics-data
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--httpListenAddr=:8428"
      - "--retentionPeriod=90d"
      - "--search.latencyOffset=0s"
      - "--search.maxUniqueTimeseries=300000"
    networks:
      - skophia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O /dev/null http://127.0.0.1:8428/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # OpenObserve — Sovereign Logs, Traces, and Audit Storage
  # ===========================================================================
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    ports:
      - "${OPENOBSERVE_PORT:-5080}:5080"
    environment:
      - ZO_ROOT_USER_EMAIL=${OPENOBSERVE_USER:-admin@skophia.local}
      - ZO_ROOT_USER_PASSWORD=${OPENOBSERVE_PASSWORD}
      - ZO_DATA_DIR=/data
      - ZO_HTTP_PORT=5080
      - ZO_TELEMETRY_ENABLED=false
    volumes:
      - openobserve-data:/data
    networks:
      - skophia-network
    restart: unless-stopped

  # Sidecar healthcheck for OpenObserve
  openobserve-healthcheck:
    image: busybox:stable
    depends_on:
      - openobserve
    networks:
      - skophia-network
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://openobserve:5080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ===========================================================================
  # Redis — Cache and Real-time Pub/Sub
  # ===========================================================================
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    networks:
      - skophia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ===========================================================================
  # VMAgent — Metrics Scraping (optional monitoring profile)
  # ===========================================================================
  vmagent:
    image: victoriametrics/vmagent:v1.96.0
    profiles:
      - monitoring
    ports:
      - "${VMAGENT_PORT:-8429}:8429"
    volumes:
      - ./docker/victoriametrics/vmagent.yml:/etc/vmagent/config.yml:ro
      - vmagent-data:/vmagentdata
    command:
      - "--promscrape.config=/etc/vmagent/config.yml"
      - "--remoteWrite.url=http://victoriametrics:8428/api/v1/write"
      - "--remoteWrite.tmpDataPath=/vmagentdata"
    depends_on:
      victoriametrics:
        condition: service_healthy
    networks:
      - skophia-network
    restart: unless-stopped

  # ===========================================================================
  # Grafana — Advanced Visualization (optional monitoring profile)
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.2.0
    profiles:
      - monitoring
    ports:
      - "${GRAFANA_PORT:-3003}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
      - GF_DATE_FORMATS_FULL_DATE=YYYY-MM-DD HH:mm:ss
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=browser
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/aiobs-dashboard.json
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=5s
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    depends_on:
      - victoriametrics
    networks:
      - skophia-network
    restart: unless-stopped

  # ===========================================================================
  # Test Runner
  # ===========================================================================
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles:
      - test
    environment:
      - TEST_SUITE=${TEST_SUITE:-all}
      - TEST_VERBOSE=${TEST_VERBOSE:-true}
      - TEST_COVERAGE=${TEST_COVERAGE:-false}
      - TEST_REPORT=${TEST_REPORT:-true}
      - TEST_PARALLEL=${TEST_PARALLEL:-false}
      - TEST_TIMEOUT=${TEST_TIMEOUT:-600}
    volumes:
      - ./test_reports:/app/test_reports
    networks:
      - test-network
    restart: "no"

# =============================================================================
# Networks
# =============================================================================
networks:
  skophia-network:
    driver: bridge
  test-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  victoriametrics-data:
    driver: local
  openobserve-data:
    driver: local
  redis-data:
    driver: local
  vmagent-data:
    driver: local
  grafana-data:
    driver: local
